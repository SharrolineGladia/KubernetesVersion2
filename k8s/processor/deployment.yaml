---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: processor
  namespace: default
  labels:
    app: processor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: processor
  template:
    metadata:
      labels:
        app: processor
    spec:
      containers:
        - name: processor
          image: processor:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9090
              name: http
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: CACHE_HOST
              value: "cache"
            - name: CACHE_PORT
              value: "6379"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: processor
  namespace: default
  labels:
    app: processor
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      name: http
  selector:
    app: processor
