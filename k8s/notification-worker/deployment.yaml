---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-worker
  namespace: default
  labels:
    app: notification-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-worker
  template:
    metadata:
      labels:
        app: notification-worker
    spec:
      containers:
        - name: notification-worker
          image: notification-worker:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9091
              name: http
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: NOTIFICATION_SERVICE_HOST
              value: "notification-service"
            - name: NOTIFICATION_SERVICE_PORT
              value: "8081"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 9091
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-worker
  namespace: default
  labels:
    app: notification-worker
spec:
  type: ClusterIP
  ports:
    - port: 9091
      targetPort: 9091
      name: http
  selector:
    app: notification-worker
